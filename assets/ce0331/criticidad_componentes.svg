<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">Criticidad de componentes del micro centro de datos</title>
  <desc id="desc">Grafico de barras con criticidad de UPS, router, switch, servidor, backup externo, access points, cableado y ventilacion.</desc>
  <defs>
    <style>
      .bg{fill:#f8faf9}.axis{stroke:#4f5c56;stroke-width:2}.grid{stroke:#d5ded9;stroke-width:1}.barHigh{fill:#3f7f73}.barMedHigh{fill:#6e9d70}.barMed{fill:#b6a35f}.label{font-family:Arial,sans-serif;font-size:19px;fill:#25302c}.small{font-family:Arial,sans-serif;font-size:15px;fill:#38443f}.title{font-family:Arial,sans-serif;font-size:30px;font-weight:700;fill:#1f2b27}
    </style>
  </defs>
  <rect class="bg" width="1100" height="720"/>
  <text class="title" x="55" y="55">Criticidad de componentes</text>
  <line class="axis" x1="230" y1="610" x2="1010" y2="610"/>
  <line class="axis" x1="230" y1="105" x2="230" y2="610"/>
  <line class="grid" x1="230" y1="490" x2="1010" y2="490"/><text class="small" x="165" y="495">Media</text>
  <line class="grid" x1="230" y1="370" x2="1010" y2="370"/><text class="small" x="132" y="375">Media-alta</text>
  <line class="grid" x1="230" y1="250" x2="1010" y2="250"/><text class="small" x="178" y="255">Alta</text>
  <rect class="barHigh" x="260" y="200" width="70" height="410" rx="5"/><text class="label" x="248" y="640">UPS</text><text class="small" x="273" y="190">Alta</text>
  <rect class="barHigh" x="355" y="200" width="70" height="410" rx="5"/><text class="label" x="345" y="640">Router</text><text class="small" x="368" y="190">Alta</text>
  <rect class="barHigh" x="450" y="200" width="70" height="410" rx="5"/><text class="label" x="440" y="640">Switch</text><text class="small" x="463" y="190">Alta</text>
  <rect class="barHigh" x="545" y="200" width="70" height="410" rx="5"/><text class="label" x="528" y="640">Servidor</text><text class="small" x="558" y="190">Alta</text>
  <rect class="barHigh" x="640" y="200" width="70" height="410" rx="5"/><text class="label" x="626" y="640">Backup</text><text class="small" x="653" y="190">Alta</text>
  <rect class="barMed" x="735" y="370" width="70" height="240" rx="5"/><text class="label" x="742" y="640">APs</text><text class="small" x="749" y="360">Media</text>
  <rect class="barMedHigh" x="830" y="300" width="70" height="310" rx="5"/><text class="label" x="812" y="640">Cableado</text><text class="small" x="831" y="290">Media-alta</text>
  <rect class="barMed" x="925" y="370" width="70" height="240" rx="5"/><text class="label" x="910" y="640">Ventilacion</text><text class="small" x="939" y="360">Media</text>
  <text class="small" x="55" y="690">Prioridad de mantenimiento: componentes de energia, conectividad central, servidor y respaldos.</text>
</svg>
