<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520"><rect width="1000" height="520" fill="#f7f9f8"/><text x="45" y="50" font-family="Arial" font-size="30" font-weight="700" fill="#1f2b27">Revisión de logs</text><rect x="80" y="110" width="840" height="310" rx="12" fill="#1f2b27"/><g font-family="Consolas,monospace" font-size="16" fill="#dceee9"><text x="115" y="155">[OK] Router: WAN activa - NAT funcionando</text><text x="115" y="195">[OK] Switch: puerto Gi0/1 trunk operativo</text><text x="115" y="235">[INFO] AP Docentes: 7 clientes conectados</text><text x="115" y="275">[WARN] UPS: prueba de batería programada</text><text x="115" y="315">[OK] Servidor: backup semanal completado</text><text x="115" y="355">[INFO] Firewall: bloqueo VLAN50 hacia LAN interna</text></g><text x="105" y="470" font-family="Arial" font-size="16" fill="#3f4d48">Los logs permiten detectar fallas, accesos no autorizados y eventos de disponibilidad.</text></svg>
