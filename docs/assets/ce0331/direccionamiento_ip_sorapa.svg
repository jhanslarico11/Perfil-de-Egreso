<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Direccionamiento IP propuesto para la I.E. Agropecuario Sorapa</title>
  <desc id="desc">Tabla visual de VLAN, subred, gateway, rango DHCP y uso institucional.</desc>
  <defs>
    <style>
      .bg{fill:#f7f9f8}.head{fill:#2f6f66}.row1{fill:#ffffff}.row2{fill:#eef5f2}.border{stroke:#c6d3cd;stroke-width:2}.title{font-family:Arial,sans-serif;font-size:32px;font-weight:700;fill:#1f2b27}.h{font-family:Arial,sans-serif;font-size:17px;font-weight:700;fill:#ffffff}.txt{font-family:Arial,sans-serif;font-size:16px;fill:#25302c}.small{font-family:Arial,sans-serif;font-size:14px;fill:#3f4d48}.badge{font-family:Arial,sans-serif;font-size:15px;font-weight:700;fill:#25302c}.legend{fill:#fff;stroke:#c6d3cd;stroke-width:2;rx:12}
    </style>
  </defs>
  <rect class="bg" width="1400" height="780"/>
  <text class="title" x="55" y="58">Direccionamiento IP por VLAN</text>
  <text class="small" x="57" y="88">Plan simple, documentable y suficiente para la escala de la I.E. Agropecuario Sorapa.</text>

  <rect class="head" x="70" y="130" width="1260" height="56" rx="10"/>
  <text class="h" x="95" y="165">VLAN</text>
  <text class="h" x="210" y="165">Nombre</text>
  <text class="h" x="450" y="165">Subred</text>
  <text class="h" x="665" y="165">Gateway</text>
  <text class="h" x="850" y="165">Rango DHCP sugerido</text>
  <text class="h" x="1120" y="165">Uso</text>

  <g>
    <rect class="row1 border" x="70" y="186" width="1260" height="78"/>
    <text class="badge" x="100" y="232">10</text><text class="txt" x="210" y="232">Administracion</text><text class="txt" x="450" y="232">192.168.10.0/24</text><text class="txt" x="665" y="232">192.168.10.1</text><text class="txt" x="850" y="232">192.168.10.101 - 200</text><text class="txt" x="1120" y="222">Direccion, Secretaria</text><text class="small" x="1120" y="246">y administracion</text>
    <rect class="row2 border" x="70" y="264" width="1260" height="78"/>
    <text class="badge" x="100" y="310">20</text><text class="txt" x="210" y="310">Docentes</text><text class="txt" x="450" y="310">192.168.20.0/24</text><text class="txt" x="665" y="310">192.168.20.1</text><text class="txt" x="850" y="310">192.168.20.101 - 200</text><text class="txt" x="1120" y="310">Wi-Fi docente</text>
    <rect class="row1 border" x="70" y="342" width="1260" height="78"/>
    <text class="badge" x="100" y="388">30</text><text class="txt" x="210" y="388">Estudiantes/Wi-Fi</text><text class="txt" x="450" y="388">192.168.30.0/24</text><text class="txt" x="665" y="388">192.168.30.1</text><text class="txt" x="850" y="388">192.168.30.101 - 220</text><text class="txt" x="1120" y="378">Aula innovacion</text><text class="small" x="1120" y="402">y estudiantes</text>
    <rect class="row2 border" x="70" y="420" width="1260" height="78"/>
    <text class="badge" x="100" y="466">40</text><text class="txt" x="210" y="466">Servidor</text><text class="txt" x="450" y="466">192.168.40.0/24</text><text class="txt" x="665" y="466">192.168.40.1</text><text class="txt" x="850" y="466">IP fija recomendada</text><text class="txt" x="1120" y="456">Servidor, switch,</text><text class="small" x="1120" y="480">router y AP</text>
    <rect class="row1 border" x="70" y="498" width="1260" height="78"/>
    <text class="badge" x="100" y="544">50</text><text class="txt" x="210" y="544">Invitados opcional</text><text class="txt" x="450" y="544">192.168.50.0/24</text><text class="txt" x="665" y="544">192.168.50.1</text><text class="txt" x="850" y="544">192.168.50.101 - 200</text><text class="txt" x="1120" y="544">Solo internet</text>
  </g>

  <rect class="legend" x="120" y="635" width="1160" height="82"/>
  <text class="txt" x="150" y="668">Patron recomendado por subred: .1 gateway | .2-.20 equipos fijos | .21-.100 PCs conocidas | .101-.200 DHCP | .201-.254 reserva.</text>
  <text class="small" x="150" y="695">El uso de /24 reduce complejidad y permite crecimiento moderado sin redisenar la red.</text>
</svg>
